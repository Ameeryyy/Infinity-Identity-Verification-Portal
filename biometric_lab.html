<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Identity - Biometric Lab</title>
    <style>
        :root { --bg: #000000; --fg: #ffffff; --dim: rgba(255, 255, 255, 0.15); --highlight: rgba(255, 255, 255, 0.9); }
        body { margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; background-color: var(--bg); background-image: linear-gradient(var(--dim) 1px, transparent 1px), linear-gradient(90deg, var(--dim) 1px, transparent 1px); background-size: 60px 60px; color: var(--fg); font-family: 'Courier New', Courier, monospace; overflow: hidden; position: relative; }
        .overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: radial-gradient(circle at center, transparent 15%, #000 90%); pointer-events: none; z-index: 1; }
        .hud-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 2; display: none; justify-content: space-between; padding: 40px; box-sizing: border-box; }
        @media (min-width: 1024px) { .hud-container { display: flex; } }
        .hud-left { width: 250px; font-size: 10px; line-height: 1.8; opacity: 0.3; text-transform: uppercase; letter-spacing: 2px; position: relative; overflow: hidden; height: 80%; margin-top: auto; margin-bottom: auto; }
        .hud-left::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 50px; background: linear-gradient(transparent, var(--bg)); }
        .terminal-stream { animation: scrollUp 20s linear infinite; }
        @keyframes scrollUp { 0% { transform: translateY(100%); } 100% { transform: translateY(-100%); } }
        .hud-right { width: 200px; display: flex; flex-direction: column; align-items: flex-end; gap: 40px; margin-top: auto; margin-bottom: auto; }
        .status-block { text-align: right; }
        .status-title { font-size: 10px; letter-spacing: 4px; opacity: 0.4; margin-bottom: 10px; text-transform: uppercase; }
        .status-value { font-size: 14px; letter-spacing: 2px; font-weight: bold; opacity: 0.8; }
        .status-value.blink { animation: blinkText 2s infinite; }
        @keyframes blinkText { 0%, 100% { opacity: 0.8; } 50% { opacity: 0.2; } }
        
        .auth-panel { border: 1px solid var(--dim); padding: 30px 25px; width: 340px; position: relative; background: rgba(0,0,0,0.85); backdrop-filter: blur(15px); box-shadow: 0 0 50px rgba(0,0,0,0.9); z-index: 10; text-align: center; display: flex; flex-direction: column; align-items: center; }
        .auth-panel::before, .auth-panel::after { content: ''; position: absolute; width: 40px; height: 40px; border: 2px solid var(--fg); opacity: 0.8; pointer-events: none; }
        .auth-panel::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .auth-panel::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }
        
        .auth-header h2 { margin: 0; font-size: 16px; letter-spacing: 6px; text-transform: uppercase; font-weight: normal; }
        .auth-header p { margin: 8px 0 20px; font-size: 9px; letter-spacing: 3px; opacity: 0.5; text-transform: uppercase; }
        
        .scanner-box { width: 180px; height: 180px; border: 1px dashed var(--dim); margin: 0 auto 20px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: #111; }
        video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(120%); z-index: 1; }
        .face-outline { width: 100px; height: 130px; border: 2px solid var(--fg); border-radius: 50% 50% 45% 45% / 60% 60% 40% 40%; position: absolute; opacity: 0.3; transition: 0.3s; z-index: 2; box-shadow: 0 0 0 200px rgba(0,0,0,0.7); pointer-events: none; }
        .scan-line { position: absolute; top: -10px; left: 0; width: 100%; height: 2px; background: var(--fg); box-shadow: 0 0 15px 2px var(--fg); display: none; z-index: 3; pointer-events: none; }
        .scan-active .face-outline { opacity: 0.8; border-color: var(--fg); box-shadow: 0 0 0 200px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,255,255,0.2); }
        .scan-active .scan-line { display: block; animation: scanAnim 2s linear infinite; }
        @keyframes scanAnim { 0% { top: 0; opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { top: 100%; opacity: 0; } }
        
        .results-grid { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 25px; width: 100%; }
        .res-col { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .res-box { width: 100%; aspect-ratio: 3/4; border: 1px solid var(--dim); background: #111; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .res-box.clickable { cursor: pointer; border-style: dashed; }
        .res-box.clickable:hover { border-color: var(--highlight); box-shadow: 0 0 10px rgba(255,255,255,0.2); }
        .res-box.clickable::after { content: 'RETAKE'; position: absolute; bottom: 5px; font-size: 8px; font-weight: bold; letter-spacing: 2px; background: rgba(0,0,0,0.8); color: var(--fg); padding: 2px 5px; opacity: 0; transition: 0.3s; pointer-events: none; }
        .res-box.clickable:hover::after { opacity: 1; }
        .res-box canvas { width: 100%; height: 100%; object-fit: cover; filter: grayscale(100%) contrast(120%); }
        .res-label { font-size: 9px; font-weight: bold; letter-spacing: 1px; text-transform: uppercase; margin-top: 8px; color: var(--dim); text-align: center; min-height: 20px; }
        
        .portal-logo { width: 50%; height: 50%; fill: var(--dim); }
        .pulse-anim { animation: pulseOp 1.5s ease-in-out infinite alternate; }
        @keyframes pulseOp { 0% { opacity: 0.3; transform: scale(0.9); } 100% { opacity: 0.8; transform: scale(1.1); fill: var(--fg); } }
        
        .status-text { font-size: 10px; letter-spacing: 2px; min-height: 35px; margin-bottom: 15px; opacity: 0.8; text-transform: uppercase; line-height: 1.5; }
        
        button { width: 100%; padding: 15px; background: var(--fg); color: var(--bg); border: 1px solid var(--fg); font-family: inherit; font-size: 12px; font-weight: bold; letter-spacing: 4px; text-transform: uppercase; cursor: pointer; transition: 0.3s; z-index: 10; position: relative; }
        button:hover:not(:disabled) { background: transparent; color: var(--fg); box-shadow: 0 0 15px rgba(255,255,255,0.3); }
        button:disabled { background: transparent; color: var(--dim); border-color: var(--dim); cursor: not-allowed; opacity: 0.5; }
    </style>
</head>
<body>
    <div class="overlay"></div>
    <div class="hud-container">
        <div class="hud-left">
            <div class="terminal-stream" id="termStream">
                [SYS] BIOMETRIC LAB INITIATED...<br><br>
                [SYS] CALIBRATING OPTICAL SENSORS...<br><br>
                [SYS] REQUESTING PERMISSIONS...
            </div>
        </div>
        <div class="hud-right">
            <div class="status-block"><div class="status-title">Target Node</div><div class="status-value">PHASE-03</div></div>
            <div class="status-block"><div class="status-title">Active Scan</div><div class="status-value blink">FACIAL AI</div></div>
            <div class="status-block"><div class="status-title">Camera Sync</div><div class="status-value" id="camStatus">AWAITING</div></div>
        </div>
    </div>
    <div class="auth-panel">
        <div class="auth-header"><h2>Facial Recognition</h2><p>AI Mesh & Profile Match</p></div>
        
        <div class="scanner-box" id="mainScanner">
            <video id="cameraFeed" autoplay playsinline muted></video>
            <div class="face-outline" id="faceOutline"></div>
            <div class="scan-line"></div>
        </div>

        <div class="results-grid">
            <div class="res-col">
                <div class="res-box">
                    <svg class="portal-logo pulse-anim" viewBox="0 0 24 24">
                        <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                    </svg>
                </div>
                <div class="res-label" style="color:var(--fg);">PORTAL<br><span id="portalMatchText">SYNCING</span></div>
            </div>
            <div class="res-col">
                <div class="res-box" id="box1" onclick="retake(1)"><canvas id="cap1" style="display:none;"></canvas></div>
                <div class="res-label" id="lbl1">SCAN 1<br>PENDING</div>
            </div>
            <div class="res-col">
                <div class="res-box" id="box2" onclick="retake(2)"><canvas id="cap2" style="display:none;"></canvas></div>
                <div class="res-label" id="lbl2">SCAN 2<br>PENDING</div>
            </div>
        </div>

        <div class="status-text" id="statusMsg">REQUESTING CAMERA ACCESS...<br>PLEASE ALLOW</div>
        <button id="actionBtn" onclick="handleAction()" disabled>INITIATE SCAN 1</button>
    </div>

    <script src="brain.js"></script>
    <script>
        let step = 1;
        let s1 = 0, s2 = 0;
        
        const btn = document.getElementById('actionBtn');
        const msg = document.getElementById('statusMsg');
        const scanner = document.getElementById('mainScanner');
        const term = document.getElementById('termStream');
        const video = document.getElementById('cameraFeed');
        const camStatus = document.getElementById('camStatus');
        
        async function initCamera() {
            try { 
                const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } }); 
                video.srcObject = stream; 
                camStatus.innerText = "ACTIVE";
                term.innerHTML += `<br><br>[OK] SENSORS ONLINE<br><br>[AUTH] AWAITING FACIAL INPUT...`;
                msg.innerHTML = "ALIGN FACE WITHIN GUIDELINES<br>AWAITING SCAN 1";
                btn.disabled = false;
            } catch (err) { 
                camStatus.innerText = "DENIED";
                camStatus.style.color = "#ff4444";
                document.getElementById('faceOutline').style.display = 'none';
                msg.innerHTML = "CAMERA ACCESS DENIED.<br>ENABLE PERMISSION TO PROCEED."; 
                term.innerHTML += `<br><br>[ERROR] PERMISSION DENIED OR NO DEVICE.`;
                btn.innerText = "ACCESS DENIED";
                btn.disabled = true; 
            }
        }
        window.addEventListener('load', initCamera);

        function getMatch() { 
            return (Math.random() * (99 - 65) + 65).toFixed(1); 
        }

        function capture(boxNum) {
            const canvas = document.getElementById(boxNum === 1 ? 'cap1' : 'cap2');
            const ctx = canvas.getContext('2d');
            canvas.width = video.videoWidth || 100;
            canvas.height = video.videoHeight || 130;
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
            canvas.style.display = 'block';
            
            let score = parseFloat(getMatch());
            if(boxNum === 1) s1 = score; else s2 = score;
            
            document.getElementById(boxNum === 1 ? 'lbl1' : 'lbl2').innerHTML = `SCAN ${boxNum}<br><span style="color:var(--fg)">${score}%</span>`;
            document.getElementById(boxNum === 1 ? 'box1' : 'box2').classList.add('clickable');
            term.innerHTML += `<br><br>[AI] SCAN ${boxNum} LOGGED: ${score}%`;
        }

        function checkTotal() {
            let total = ((s1 + s2) / 2).toFixed(1);
            term.innerHTML += `<br><br>[AI] TOTAL AVG MATCH: ${total}%`;
            if(total >= 75) {
                msg.innerHTML = `TOTAL AVG MATCH: <span style="color:var(--fg);font-size:12px;">${total}%</span><br>CLICK CONFIRM TO PROCEED.`;
                btn.innerText = "CONFIRM & PROCEED";
                btn.disabled = false;
            } else {
                msg.innerHTML = `TOTAL AVG MATCH: <span style="color:#ff4444;font-size:12px;">${total}%</span><br>MATCH TOO LOW. CLICK A PHOTO TO RETAKE.`;
                btn.innerText = "MATCH FAILED";
                btn.disabled = true;
            }
        }

        function handleAction() {
            if (!video.srcObject) return;
            
            if (step === 3) {
                let total = ((s1 + s2) / 2).toFixed(1);
                if(total >= 75) {
                    video.srcObject.getTracks().forEach(t => t.stop());
                    window.location.href = 'biometric_fingers.html';
                }
                return;
            }

            btn.disabled = true; 
            scanner.classList.add('scan-active');
            
            if(step === 1) {
                btn.innerText = "SCANNING...";
                msg.innerHTML = "AI ANALYSIS IN PROGRESS...<br>MAPPING FACIAL MESH...";
                setTimeout(() => {
                    scanner.classList.remove('scan-active');
                    
                    const pLogo = document.querySelector('.portal-logo');
                    if(pLogo) {
                        pLogo.classList.remove('pulse-anim');
                        pLogo.style.fill = 'var(--fg)';
                        pLogo.style.opacity = '1';
                    }
                    document.getElementById('portalMatchText').innerText = '100%';

                    capture(1);
                    step = 2;
                    btn.disabled = false;
                    btn.innerText = "INITIATE SCAN 2";
                    msg.innerHTML = "SCAN 1 SAVED.<br>INITIATE SCAN 2.";
                }, 2000);
            } else if(step === 2) {
                btn.innerText = "SCANNING...";
                msg.innerHTML = "CHECKING LIVELINESS...<br>ANALYZING DEPTH...";
                setTimeout(() => {
                    scanner.classList.remove('scan-active');
                    capture(2);
                    step = 3;
                    checkTotal();
                }, 2000);
            }
        }

        function retake(boxNum) {
            if(step < boxNum || !video.srcObject) return; 
            
            btn.disabled = true; 
            scanner.classList.add('scan-active');
            let oldText = btn.innerText;
            btn.innerText = "RETAKING...";
            msg.innerHTML = `RETAKING SCAN ${boxNum}...<br>ALIGN FACE WITHIN GUIDELINES`;
            
            setTimeout(() => {
                scanner.classList.remove('scan-active');
                capture(boxNum);
                
                if(step === 3) {
                    checkTotal();
                } else {
                    btn.disabled = false;
                    btn.innerText = oldText;
                    msg.innerHTML = `SCAN ${boxNum} UPDATED.<br>PROCEED WITH NEXT SCAN.`;
                }
            }, 2000);
        }
    </script>
</body>
</html>
