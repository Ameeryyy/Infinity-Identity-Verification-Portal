<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Infinity Identity - Node Settings</title>
    <style>
        :root { --bg: #000000; --fg: #ffffff; --dim: rgba(255, 255, 255, 0.15); --accent: #ffffff; }
        @media (prefers-color-scheme: light) { :root { --bg: #ffffff; --fg: #000000; --dim: rgba(0, 0, 0, 0.15); --accent: #000000; } }
        body { margin: 0; padding: 0; background-color: var(--bg) !important; background-image: linear-gradient(var(--dim) 1px, transparent 1px), linear-gradient(90deg, var(--dim) 1px, transparent 1px); background-size: 60px 60px; color: var(--fg) !important; font-family: 'Courier New', Courier, monospace; overflow-x: hidden; overflow-y: auto; }
        .top-left { position: absolute; top: clamp(20px, 4vw, 40px); left: clamp(20px, 4vw, 40px); cursor: pointer; opacity: 0.6; transition: opacity 0.3s; color: inherit; display: flex; align-items: center; justify-content: center; text-decoration: none; z-index: 10; padding: 10px; border: 1px solid transparent; }
        .top-left:hover { opacity: 1; border-color: var(--dim); background: rgba(255,255,255,0.05); }
        .top-left svg { width: clamp(24px, 6vw, 28px); height: clamp(24px, 6vw, 28px); fill: currentColor; }
        .container { display: flex; flex-direction: column; justify-content: center; width: 90%; max-width: 600px; min-height: 100vh; padding: clamp(80px, 12vh, 100px) 0 clamp(40px, 6vh, 60px) 0; animation: fadeIn 0.5s; text-align: left; box-sizing: border-box; margin: 0 auto; z-index: 10; position: relative; }
        .brand-title { font-size: clamp(12px, 2.5vw, 14px); font-weight: bold; text-transform: uppercase; letter-spacing: 5px; opacity: 0.5; margin-bottom: 10px; text-align: center; }
        h2 { font-weight: normal; margin-top: 0; margin-bottom: clamp(40px, 6vw, 50px); text-align: center; font-size: clamp(26px, 6vw, 36px); text-transform: uppercase; letter-spacing: 4px; }
        .setting-group { background: rgba(0,0,0,0.8); border: 1px solid var(--dim); padding: 35px; margin-bottom: 30px; position: relative; backdrop-filter: blur(10px); }
        .setting-group::before, .setting-group::after { content: ''; position: absolute; width: 20px; height: 20px; border: 2px solid var(--fg); opacity: 0.5; }
        .setting-group::before { top: -2px; left: -2px; border-right: none; border-bottom: none; }
        .setting-group::after { bottom: -2px; right: -2px; border-left: none; border-top: none; }
        @media (prefers-color-scheme: light) { .setting-group { background: rgba(255,255,255,0.9); } }
        .setting-group h3 { font-size: 14px; font-weight: normal; margin-top: 0; margin-bottom: 25px; opacity: 0.8; letter-spacing: 3px; text-transform: uppercase; color: var(--accent); border-bottom: 1px solid var(--dim); padding-bottom: 10px; }
        .btn-group { display: flex; flex-direction: column; gap: 15px; }
        button { padding: 16px; border: 1px solid var(--dim); background: transparent; color: inherit; cursor: pointer; font-size: 13px; font-weight: bold; font-family: inherit; transition: all 0.3s ease; display: flex; justify-content: center; align-items: center; text-transform: uppercase; letter-spacing: 3px; position: relative; overflow: hidden; }
        button::before { content: ''; position: absolute; top: 0; left: -100%; width: 100%; height: 100%; background: rgba(255,255,255,0.1); transition: 0.3s; }
        button:hover::before { left: 0; }
        button:hover { border-color: var(--fg); box-shadow: 0 0 15px rgba(255,255,255,0.1); }
        button:active { transform: scale(0.98); }
        button.active { background: var(--fg); color: var(--bg); border-color: var(--fg); }
        button.active:hover::before { background: rgba(0,0,0,0.1); }
        
        .security-status { font-size: 11px; letter-spacing: 2px; opacity: 0.6; margin-top: 15px; text-align: center; text-transform: uppercase; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <a href="home.html" class="top-left">
        <svg viewBox="0 0 24 24"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
    </a>
    <div class="container">
        <div class="brand-title">Node Configuration</div>
        <h2>System Settings</h2>
        
        <div class="setting-group">
            <h3>Protocol Theme Override</h3>
            <div class="btn-group" id="theme-group">
                <button id="btn-system" data-label="System Match" onclick="changeTheme('system')">System Match</button>
                <button id="btn-dark" data-label="Pure B&W Theme" onclick="changeTheme('dark')">Pure B&W Theme</button>
                <button id="btn-light" data-label="High Contrast Light" onclick="changeTheme('light')">High Contrast Light</button>
            </div>
        </div>
        
        <div class="setting-group">
            <h3>Master Authentication Layer</h3>
            <div class="btn-group">
                <button id="btn-lock" onclick="toggleLock()">Vault Lock: Disabled</button>
            </div>
            <div class="security-status" id="security-status-text">Status: Unsecured. Biometric auth not active.</div>
        </div>
    </div>
    <script src="brain.js"></script>
    <script>
        function updateUI() {
            const settings = typeof brain !== 'undefined' ? (brain.settings || {}) : {};
            document.querySelectorAll('#theme-group button').forEach(b => {
                b.classList.remove('active');
                b.innerText = b.getAttribute('data-label');
            });
            const theme = settings.theme || 'system';
            const themeBtn = document.getElementById('btn-' + theme);
            if (themeBtn) {
                themeBtn.classList.add('active');
                themeBtn.innerText = '[ ACTIVE ] ' + themeBtn.getAttribute('data-label');
            }
            const lockBtn = document.getElementById('btn-lock');
            const statusText = document.getElementById('security-status-text');
            if (settings.appLock) {
                lockBtn.innerText = 'Disable Vault Lock';
                lockBtn.classList.add('active');
                statusText.innerText = 'Status: Secured. Biometric auth is active.';
                statusText.style.color = 'var(--fg)';
                statusText.style.opacity = '1';
            } else {
                lockBtn.innerText = 'Enable Vault Lock';
                lockBtn.classList.remove('active');
                statusText.innerText = 'Status: Unsecured. Biometric auth not active.';
                statusText.style.color = 'inherit';
                statusText.style.opacity = '0.6';
            }
        }
        function changeTheme(theme) {
            if(typeof brain !== 'undefined') brain.saveSettings({ theme });
            updateUI();
        }
        async function toggleLock() {
            const settings = typeof brain !== 'undefined' ? (brain.settings || {}) : {};
            if (settings.appLock) {
                if(typeof brain !== 'undefined') brain.saveSettings({ appLock: false });
                updateUI();
            } else {
                if(typeof brain !== 'undefined') {
                    const success = await brain.setupAuth();
                    if (success) {
                        brain.saveSettings({ appLock: true });
                        updateUI();
                    } else {
                        if(window.alert) {
                            alert('Node Error', 'Failed to configure biometric lock.');
                        } else {
                            console.error('Failed to configure biometric lock.');
                        }
                    }
                } else {
                    console.error('brain.js not loaded.');
                }
            }
        }
        updateUI();
    </script>
</body>
</html>
